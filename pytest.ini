[pytest]
pythonpath = .
addopts =
    -v
    --alluredir=reports/allure-results
    --reruns=2
    --reruns-delay=3
    --screenshot=only-on-failure
    --video=retain-on-failure
    --tracing=retain-on-failure

markers =
    smoke: Quick regression path tests
    auth: Email/password authentication tests
    oauth: Mock OAuth provider tests
    session: Session persistence and expiration tests
    security: Security-related tests (rate limiting, injection)
    network: Network interception and mocking tests

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
